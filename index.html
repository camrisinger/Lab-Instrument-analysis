<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Processing Website</title>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

textarea {
    width: 100%;
    height: 100px;
}

button {
    padding: 10px;
    margin-top: 10px;
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

select {
    padding: 8px;
    margin-top: 10px;
}

.output {
    margin-top: 15px;
    background: #ecf0f1;
    padding: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    margin-bottom: 15px;
}

.grid input {
    padding: 5px;
    text-align: center;
}
</style>
</head>

<body>

<header>
<h1>Data Processing Website</h1>
<p>Upload, analyze, and visualize your data</p>
</header>

<div class="container">

<!-- FILE UPLOAD -->
<h2>Upload Excel/CSV</h2>
<input type="file" id="fileInput" accept=".xlsx,.csv">

<h3>Select Column</h3>
<select id="columnSelect"></select>
<button onclick="analyzeData()">Analyze File</button>

<!-- GRID INPUT -->
<h2>Manual 8×12 Data Entry</h2>

<h3>Labels Grid</h3>
<div id="labelGrid"></div>

<h3>Data Grid</h3>
<div id="dataGrid"></div>

<button onclick="analyzeGrid()">Analyze Grid</button>

<!-- OUTPUT -->
<div class="output" id="stats"></div>
<canvas id="chart" height="100"></canvas>

<div id="tableContainer"></div>

</div>

<script>
let jsonData = [];
let headers = [];
let chart;

/* ---------------- FILE HANDLING ---------------- */
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        jsonData = XLSX.utils.sheet_to_json(sheet);

        headers = Object.keys(jsonData[0] || {});
        populateColumns();
        displayTable();
    };

    reader.readAsArrayBuffer(file);
});

function populateColumns(){
    const select = document.getElementById("columnSelect");
    select.innerHTML = "";
    headers.forEach(h=>{
        let opt = document.createElement("option");
        opt.value = h;
        opt.text = h;
        select.appendChild(opt);
    });
}

function displayTable(){
    if(jsonData.length === 0) return;

    let html = "<table><tr>";
    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr>";

    jsonData.forEach(row=>{
        html += "<tr>";
        headers.forEach(h=> html += `<td>${row[h]}</td>`);
        html += "</tr>";
    });

    html += "</table>";
    document.getElementById("tableContainer").innerHTML = html;
}

function analyzeData(){
    const column = document.getElementById("columnSelect").value;

    let values = jsonData.map(r => parseFloat(r[column]))
                         .filter(v => !isNaN(v));

    computeStats(values, "File Data");
}

/* ---------------- GRID ---------------- */
function createGrid(id, numeric=false){
    const container = document.getElementById(id);
    container.className = "grid";
    container.innerHTML = "";

    for(let i=0;i<96;i++){
        let input = document.createElement("input");
        input.type = numeric ? "number" : "text";
        container.appendChild(input);
    }
}

createGrid("labelGrid", false);
createGrid("dataGrid", true);

function analyzeGrid(){
    const dataInputs = document.querySelectorAll("#dataGrid input");
    const labelInputs = document.querySelectorAll("#labelGrid input");

    let values = [];
    let labels = [];

    dataInputs.forEach((input,i)=>{
        let val = parseFloat(input.value);
        if(!isNaN(val)){
            values.push(val);
            labels.push(labelInputs[i].value || `Cell ${i+1}`);
        }
    });

    computeStats(values, "Grid Data", labels);
}

/* ---------------- STATS + CHART ---------------- */
function computeStats(values, label, labels=null){
    if(values.length === 0){
        document.getElementById("stats").innerHTML = "⚠️ No numeric data.";
        return;
    }

    let sum = values.reduce((a,b)=>a+b,0);
    let avg = sum/values.length;
    let min = Math.min(...values);
    let max = Math.max(...values);
    let sorted = [...values].sort((a,b)=>a-b);
    let median = sorted[Math.floor(sorted.length/2)];

    document.getElementById("stats").innerHTML = `
        <strong>${label} Statistics:</strong><br>
        Count: ${values.length}<br>
        Mean: ${avg.toFixed(2)}<br>
        Median: ${median}<br>
        Min: ${min}<br>
        Max: ${max}
    `;

    drawChart(values, labels);
}

function drawChart(values, labels){
    const ctx = document.getElementById("chart");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
        type:'bar',
        data:{
            labels: labels || values.map((_,i)=>i+1),
            datasets:[{
                label:"Values",
                data:values
            }]
        },
        options:{
            scales:{
                x:{ ticks:{ display: false } }
            }
        }
    });
}
</script>

</body>
</html>
